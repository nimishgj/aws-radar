name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure Tag Is On Main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Verify CI Passed For Tag Commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/actions/workflows/ci.yaml/runs?head_sha={sha}&status=completed"

          req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          })
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          runs = data.get("workflow_runs", [])
          if not runs:
              print("No CI workflow runs found for this commit.", file=sys.stderr)
              sys.exit(1)

          for run in runs:
              if run.get("conclusion") == "success":
                  sys.exit(0)

          print("CI workflow did not succeed for this commit.", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Set Up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login To GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GoReleaser builds the cross-platform binaries + archives + checksums,
      # publishes them to the GitHub Release, and builds/pushes the multi-arch
      # Docker images to GHCR (replacing the previous docker/build-push flow).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
