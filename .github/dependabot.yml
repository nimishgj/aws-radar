version: 2
updates:
  # Go modules. The AWS SDK alone pulls in 60+ modules, so updates are grouped
  # to keep them to a couple of PRs per week instead of dozens.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      aws-sdk-go-v2:
        patterns:
          - "github.com/aws/aws-sdk-go-v2*"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/aws/aws-sdk-go-v2*"

  # GitHub Actions used in the CI and release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  # Base images in the Dockerfiles (golang, alpine).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
