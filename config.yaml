server:
  port: 9090
  metrics_path: /metrics
  health_path: /health

collection:
  interval: 60s
  timeout: 30s

aws:
  regions:
    - us-east-1
    - ap-south-1

cost_explorer:
  enabled: true
  frequency: hourly # hourly | daily | weekly | monthly

cost_cur:
  enabled: false
  bucket: ""
  prefix: ""
  report_name: ""
  format: ""           # auto-detect from manifest; "parquet" or "csv"
  frequency: daily     # hourly | daily
  region: us-east-1
  max_resources: 100

collectors:
  - apigateway
  - apigatewayv2
  - autoscaling
  - athena
  - configservice
  - mq
  - ses
  - cloudformation
  - documentdb
  - neptune
  - memorydb
  - timestream
  - fsx
  - backup
  - kinesis
  - firehose
  - kinesisanalytics
  - emr
  - elasticbeanstalk
  - kms
  - cloudtrail
  - kinesisvideo
  - opensearchserverless
  - s3control
  - batch
  - codebuild
  - codepipeline
  - codedeploy
  - ecr
  - ec2
  - efs
  - eventbridge
  - glue
  - apprunner
  - transfer
  - msk
  - redshift
  - s3
  - rds
  - lambda
  - ecs
  - elb
  - eks
  - dynamodb
  - elasticache
  - opensearch
  - guardduty
  - securityhub
  - inspector2
  - macie
  - waf
  - secretsmanager
  - sfn
  - ssm
  - sqs
  - sns
  - ebs
  - vpc
  - acm
  - cloudfront
  - route53
  - route53resolver
  - iam
  - shield
  - ecrpublic
  - directconnect
  - organizations
  - controltower
  - bedrock
  - sagemaker
  - quicksight
  - workspaces
  - appstream
  - connect
  - amplify
  - globalaccelerator
  - datasync
  - dms
  - cognito
  - networkfirewall
  - fms
  - acmpca
  - servicecatalog
  - licensemanager

logging:
  level: info
  format: json
